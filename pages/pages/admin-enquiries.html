<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Enquiries | Nyumba UG</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .admin-wrapper {
            padding: 40px 5%;
        }

        .enquiry-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .enquiry-table th {
            background: var(--green-dark);
            color: var(--gold);
            padding: 14px 16px;
            text-align: left;
            font-size: 0.82rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .enquiry-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-mid);
            vertical-align: top;
        }

        .enquiry-table tr:last-child td {
            border-bottom: none;
        }

        .enquiry-table tr:hover td {
            background: var(--cream);
        }

        .badge-new {
            background: var(--gold);
            color: var(--green-dark);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-read {
            background: var(--cream-dark);
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
        }

        .msg-preview {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 28px;
            flex: 1;
            min-width: 140px;
        }

        .stat-box .num {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--green-dark);
        }

        .stat-box .lbl {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .enquiry-table thead {
                display: none;
            }

            .enquiry-table tr {
                display: block;
                margin-bottom: 16px;
                border: 1px solid var(--border);
                border-radius: var(--radius);
            }

            .enquiry-table td {
                display: block;
                padding: 10px 14px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-logo"><a href="../index.html">Nyumba<span>UG</span></a></div>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="listings.html">Listings</a></li>
            <li><a href="admin-enquiries.html" class="active">Enquiries</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="#" onclick="api.auth.logout()" class="nav-cta">Logout</a></li>
        </ul>
    </nav>

    <div style="padding-top: var(--nav-h);">
        <div class="admin-wrapper">
            <h1 style="color:var(--green-dark); margin-bottom:8px;">📬 Contact Enquiries</h1>
            <p style="color:var(--text-muted); margin-bottom:32px;">All messages sent via the contact form.</p>

            <div class="stats-row" id="stats-row">
                <div class="stat-box">
                    <div class="num" id="stat-total">—</div>
                    <div class="lbl">Total Messages</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="stat-new">—</div>
                    <div class="lbl">Unread</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="stat-today">—</div>
                    <div class="lbl">Today</div>
                </div>
            </div>

            <div id="table-wrap">
                <div style="text-align:center; padding:60px; color:var(--text-muted);">Loading enquiries...</div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        requireAuth('admin');

        async function loadEnquiries() {
            try {
                const data = await api.enquiries.getMy();
                const enquiries = data.enquiries || data || [];

                // Stats
                const today = new Date().toDateString();
                document.getElementById('stat-total').textContent = enquiries.length;
                document.getElementById('stat-new').textContent = enquiries.filter(e => e.status === 'new' || !e.status).length;
                document.getElementById('stat-today').textContent = enquiries.filter(e => new Date(e.created_at).toDateString() === today).length;

                if (enquiries.length === 0) {
                    document.getElementById('table-wrap').innerHTML = `
            <div style="text-align:center; padding:60px; color:var(--text-muted);">
              <div style="font-size:3rem; margin-bottom:16px;">📭</div>
              <p>No enquiries yet.</p>
            </div>`;
                    return;
                }

                document.getElementById('table-wrap').innerHTML = `
          <table class="enquiry-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Message</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${enquiries.map((e, i) => `
                <tr id="row-${e.id}">
                  <td>${i + 1}</td>
                  <td><strong>${e.name || '—'}</strong></td>
                  <td><a href="mailto:${e.email}" style="color:var(--green-light);">${e.email || '—'}</a></td>
                  <td><a href="tel:${e.phone}" style="color:var(--green-light);">${e.phone || '—'}</a></td>
                  <td class="msg-preview" title="${e.message}">${e.message || '—'}</td>
                  <td>
                    ${(e.status === 'new' || !e.status)
                        ? `<span class="badge-new">New</span>`
                        : `<span class="badge-read">Read</span>`}
                  </td>
                  <td style="white-space:nowrap;">${new Date(e.created_at).toLocaleDateString('en-UG', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                  <td>
                    <button onclick="markRead('${e.id}')" class="btn btn-green" style="padding:6px 14px; font-size:0.8rem;">
                      Mark Read
                    </button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
            } catch (err) {
                document.getElementById('table-wrap').innerHTML = `
          <div style="text-align:center; padding:60px; color:#cc4444;">
            ❌ Failed to load enquiries. Make sure you're logged in as admin.
          </div>`;
            }
        }

        async function markRead(id) {
            try {
                await api.enquiries.updateStatus(id, 'read');
                showToast('✅ Marked as read');
                loadEnquiries();
            } catch (e) {
                showToast('❌ Could not update status');
            }
        }

        window.markRead = markRead;
        loadEnquiries();
    </script>
</body>

</html>
