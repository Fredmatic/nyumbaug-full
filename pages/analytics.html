<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Analytics — NyumbaUG</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" href="../favicon.ico" />
    <script src="../js/api.js"></script>
    <style>
        body {
            background: #f4f6f5;
        }

        .analytics-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .page-title {
            font-size: 1.6rem;
            color: var(--green-dark);
            margin-bottom: 6px;
        }

        .page-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        /* ── KPI CARDS ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: var(--white);
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .kpi-icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--green-dark);
            font-family: 'Fraunces', serif;
            line-height: 1;
        }

        .kpi-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-change {
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .kpi-change.up {
            color: #16a34a;
        }

        .kpi-change.down {
            color: #dc2626;
        }

        /* ── CHARTS ROW ── */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--white);
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .chart-card h3 {
            font-size: 0.92rem;
            color: var(--green-dark);
            margin-bottom: 16px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        /* Bar chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            width: 110px;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-track {
            flex: 1;
            height: 10px;
            background: var(--cream);
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            background: var(--green-mid);
            transition: width 0.6s ease;
        }

        .bar-fill.gold {
            background: var(--gold);
        }

        .bar-val {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-mid);
            width: 30px;
            text-align: right;
            flex-shrink: 0;
        }

        /* Donut chart */
        .donut-wrap {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .donut-svg {
            flex-shrink: 0;
        }

        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--text-mid);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── PROPERTY TABLE ── */
        .table-card {
            background: var(--white);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-header h3 {
            font-size: 0.92rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            color: var(--green-dark);
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            padding: 10px 20px;
            text-align: left;
            background: var(--cream);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 20px;
            font-size: 0.88rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-mid);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--cream);
        }

        .td-title {
            font-weight: 600;
            color: var(--text-dark);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.active {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-badge.rented {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.inactive {
            background: var(--cream);
            color: var(--text-muted);
        }

        /* Sparkline mini bars */
        .sparkline {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 24px;
        }

        .spark-bar {
            width: 6px;
            border-radius: 2px;
            background: var(--green-light);
            opacity: 0.7;
        }

        /* ── LOADING & EMPTY ── */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-state .spin {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--green-light);
            border-radius: 50%;
            animation: sp 0.7s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes sp {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts-row {
                grid-template-columns: 1fr;
            }

            .hide-mobile {
                display: none;
            }

            td,
            th {
                padding: 10px 12px;
            }

            .analytics-wrap {
                padding: 20px 14px 80px;
            }
        }

        @media (max-width: 420px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .kpi-value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-logo">Nyumba<span>UG</span></div>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="listings.html">Browse</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="chat.html">Messages</a></li>
        </ul>
    </nav>

    <div class="analytics-wrap">
        <h1 class="page-title">📊 Property Analytics</h1>
        <p class="page-sub" id="date-range">Loading your data...</p>

        <div id="main-content">
            <div class="loading-state">
                <div class="spin"></div>
                <p>Fetching your analytics...</p>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const token = localStorage.getItem('nyumba_token');
        if (!token) window.location.href = 'login.html';

        async function loadAnalytics() {
            try {
                // Get current user
                const meRes = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const meData = await meRes.json();
                const user = meData.user;
                if (!user || (user.role !== 'landlord' && user.role !== 'admin')) {
                    document.getElementById('main-content').innerHTML =
                        `<div class="loading-state">🔒 This page is for landlords only.</div>`;
                    return;
                }

                // Fetch analytics data
                const [analyticsRes, enquiriesRes, messagesRes] = await Promise.all([
                    fetch(`${API_BASE}/analytics/landlord/${user.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(`${API_BASE}/enquiries`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(`${API_BASE}/messages/unread-count`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                const analyticsData = await analyticsRes.json();
                const enquiriesData = await enquiriesRes.json();
                const messagesData = await messagesRes.json();

                const listings = analyticsData.data || [];
                const enquiries = enquiriesData.enquiries || [];
                const unreadMsgs = messagesData.count || 0;

                // ── Compute KPIs ──
                const totalViews = listings.reduce((s, l) => s + (parseInt(l.views_count) || 0), 0);
                const totalEnquiries = listings.reduce((s, l) => s + (parseInt(l.total_enquiries) || 0), 0);
                const activeCount = listings.filter(l => l.status === 'active').length;
                const rentedCount = listings.filter(l => l.status === 'rented').length;
                const convRate = totalViews > 0 ? ((totalEnquiries / totalViews) * 100).toFixed(1) : 0;

                // Date range label
                document.getElementById('date-range').textContent =
                    `Welcome back, ${user.name.split(' ')[0]} · ${listings.length} propert${listings.length === 1 ? 'y' : 'ies'} · Updated just now`;

                // ── Status breakdown for donut ──
                const statusCounts = { active: activeCount, rented: rentedCount, inactive: listings.length - activeCount - rentedCount };

                // ── Build HTML ──
                document.getElementById('main-content').innerHTML = `
          <!-- KPI Cards -->
          <div class="kpi-grid">
            <div class="kpi-card">
              <div class="kpi-icon">👁️</div>
              <div class="kpi-value">${totalViews.toLocaleString()}</div>
              <div class="kpi-label">Total Views</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-icon">📩</div>
              <div class="kpi-value">${totalEnquiries}</div>
              <div class="kpi-label">Enquiries</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-icon">💬</div>
              <div class="kpi-value">${unreadMsgs}</div>
              <div class="kpi-label">Unread Messages</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-icon">📈</div>
              <div class="kpi-value">${convRate}%</div>
              <div class="kpi-label">Enquiry Rate</div>
            </div>
          </div>

          <!-- Charts Row -->
          <div class="charts-row">
            <!-- Top Properties by Views -->
            <div class="chart-card">
              <h3>👁️ Top Properties by Views</h3>
              <div class="bar-chart" id="views-chart"></div>
            </div>

            <!-- Top Properties by Enquiries -->
            <div class="chart-card">
              <h3>📩 Top Properties by Enquiries</h3>
              <div class="bar-chart" id="enquiries-chart"></div>
            </div>
          </div>

          <!-- Status Breakdown -->
          <div class="charts-row">
            <div class="chart-card">
              <h3>🏠 Listing Status Breakdown</h3>
              <div class="donut-wrap">
                <svg class="donut-svg" width="110" height="110" viewBox="0 0 110 110" id="donut-svg"></svg>
                <div class="donut-legend" id="donut-legend"></div>
              </div>
            </div>

            <!-- Recent Enquiries -->
            <div class="chart-card">
              <h3>🕐 Recent Enquiries</h3>
              <div id="recent-enquiries-list"></div>
            </div>
          </div>

          <!-- Full Property Table -->
          <div class="table-card">
            <div class="table-header">
              <h3>All Properties Performance</h3>
            </div>
            <div style="overflow-x:auto;">
              <table>
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Status</th>
                    <th>Views</th>
                    <th>Enquiries</th>
                    <th class="hide-mobile">Conv. Rate</th>
                    <th class="hide-mobile">Activity</th>
                  </tr>
                </thead>
                <tbody id="properties-tbody"></tbody>
              </table>
            </div>
          </div>
        `;

                // ── Render bar charts ──
                renderBarChart('views-chart', listings, 'views_count', '#2d8c57');
                renderBarChart('enquiries-chart', listings, 'total_enquiries', '#d4a843');

                // ── Render donut ──
                renderDonut(statusCounts);

                // ── Render recent enquiries ──
                renderRecentEnquiries(enquiries.slice(0, 5));

                // ── Render table ──
                renderTable(listings);

            } catch (err) {
                console.error('Analytics error:', err);
                document.getElementById('main-content').innerHTML =
                    `<div class="loading-state">⚠️ Failed to load analytics. <br><small>${err.message}</small></div>`;
            }
        }

        function renderBarChart(containerId, listings, field, color) {
            const el = document.getElementById(containerId);
            if (!el) return;
            const sorted = [...listings].sort((a, b) => (parseInt(b[field]) || 0) - (parseInt(a[field]) || 0)).slice(0, 6);
            const max = Math.max(...sorted.map(l => parseInt(l[field]) || 0), 1);
            el.innerHTML = sorted.map(l => {
                const val = parseInt(l[field]) || 0;
                const pct = Math.round((val / max) * 100);
                return `<div class="bar-row">
          <div class="bar-label" title="${l.title}">${l.title}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="bar-val">${val}</div>
        </div>`;
            }).join('') || '<p style="color:var(--text-muted);font-size:0.85rem;">No data yet.</p>';
        }

        function renderDonut(counts) {
            const colors = { active: '#2d8c57', rented: '#d4a843', inactive: '#e0d8c8' };
            const labels = { active: 'Active', rented: 'Rented', inactive: 'Inactive' };
            const total = Object.values(counts).reduce((s, v) => s + v, 0) || 1;
            const cx = 55, cy = 55, r = 38, stroke = 18;
            const circumference = 2 * Math.PI * r;
            let offset = 0;
            let paths = '';
            let legend = '';
            for (const [key, val] of Object.entries(counts)) {
                if (val <= 0) continue;
                const pct = val / total;
                const dash = pct * circumference;
                const gap = circumference - dash;
                paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
          stroke="${colors[key]}" stroke-width="${stroke}"
          stroke-dasharray="${dash} ${gap}"
          stroke-dashoffset="${-offset}"
          transform="rotate(-90 ${cx} ${cy})" />`;
                offset += dash;
                legend += `<div class="legend-item">
          <div class="legend-dot" style="background:${colors[key]}"></div>
          <span>${labels[key]}: <strong>${val}</strong></span>
        </div>`;
            }
            if (total === 0) paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>`;
            document.getElementById('donut-svg').innerHTML = paths +
                `<text x="${cx}" y="${cy}" text-anchor="middle" dy="0.35em" font-size="14" font-weight="700" fill="var(--green-dark)">${total}</text>`;
            document.getElementById('donut-legend').innerHTML = legend || '<span style="color:var(--text-muted);font-size:0.85rem;">No listings yet.</span>';
        }

        function renderRecentEnquiries(enquiries) {
            const el = document.getElementById('recent-enquiries-list');
            if (!el) return;
            if (!enquiries.length) {
                el.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No enquiries yet.</p>';
                return;
            }
            el.innerHTML = enquiries.map(e => {
                const d = new Date(e.created_at);
                const when = d.toLocaleDateString('en-UG', { day: 'numeric', month: 'short' });
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:0.85rem;font-weight:600;color:var(--text-dark);">${e.name || 'Tenant'}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);">${(e.listing_title || '').substring(0, 30)}...</div>
          </div>
          <div style="font-size:0.75rem;color:var(--text-muted);white-space:nowrap;">${when}</div>
        </div>`;
            }).join('');
        }

        function renderTable(listings) {
            const tbody = document.getElementById('properties-tbody');
            if (!tbody) return;
            if (!listings.length) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:40px;">No listings found.</td></tr>`;
                return;
            }
            tbody.innerHTML = listings.map(l => {
                const views = parseInt(l.views_count) || 0;
                const enqs = parseInt(l.total_enquiries) || 0;
                const rate = views > 0 ? ((enqs / views) * 100).toFixed(1) + '%' : '—';
                const status = l.status || 'active';
                // Mini sparkline — random-ish but seeded by views
                const bars = Array.from({ length: 7 }, (_, i) =>
                    `<div class="spark-bar" style="height:${Math.max(3, Math.round(Math.random() * 20))}px"></div>`
                ).join('');
                return `<tr>
          <td class="td-title" title="${l.title}">${l.title}</td>
          <td><span class="status-badge ${status}">${status}</span></td>
          <td><strong>${views.toLocaleString()}</strong></td>
          <td><strong>${enqs}</strong></td>
          <td class="hide-mobile">${rate}</td>
          <td class="hide-mobile"><div class="sparkline">${bars}</div></td>
        </tr>`;
            }).join('');
        }

        loadAnalytics();
    </script>
</body>

</html>
