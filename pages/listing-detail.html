<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Detail — Nyumba UG</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .detail-wrapper {
      padding: 32px 5% 80px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .breadcrumb a {
      color: var(--green-light);
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .detail-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    .detail-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--text-mid);
      margin-bottom: 24px;
    }

    .detail-location svg {
      width: 16px;
      height: 16px;
      stroke: var(--green-light);
    }

    .detail-price-big {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .detail-price-big span {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .contact-card-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .landlord-info {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .landlord-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--green-dark);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      background: var(--cream-dark);
      color: var(--green-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .similar-section {
      margin-top: 64px;
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-logo"><a href="../index.html">Nyumba<span>UG</span></a></div>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="listings.html" class="active">Browse Listings</a></li>
      <li><a href="list-property.html">List Property</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html" class="nav-cta">Sign Up</a></li>
    </ul>
  </nav>

  <div id="detail-content" style="padding-top: var(--nav-h);">
    <div style="text-align:center; padding: 80px; color: var(--text-muted);">Loading property...</div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    async function loadListing() {
      try {
        const data = await api.listings.getOne(id);
        const listing = data.listing;

        // map api fields to template fields
        listing.location = listing.neighbourhood + ', ' + listing.district;
        listing.image = listing.images?.[0]?.url ||
          'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&q=80';
        listing.landlord = listing.landlord_name;
        listing.phone = listing.landlord_phone;
        listing.available = listing.available_from || 'Immediately';

        renderDetail(listing);
      } catch (e) {
        // fallback to hardcoded listings
        const listing = listings.find(l => l.id == id);
        if (listing) renderDetail(listing);
        else showNotFound();
      }
    }

    function showNotFound() {
      document.getElementById('detail-content').innerHTML = `
    <div style="text-align:center; padding: 80px;">
      <h2 style="color:var(--green-dark);">Property Not Found</h2>
      <p style="color:var(--text-muted); margin: 12px 0 24px;">This listing may have been removed.</p>
      <a href="listings.html" class="btn btn-green">Browse All Listings</a>
    </div>
  `;
    }

    function renderDetail(listing) {
      // your existing render code
    }

    loadListing();
  </script>
</body>

</html>
