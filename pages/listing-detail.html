<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Detail — Nyumba UG</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .detail-wrapper {
      padding: 32px 5% 80px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .breadcrumb a {
      color: var(--green-light);
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .detail-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    .detail-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--text-mid);
      margin-bottom: 24px;
    }

    .detail-location svg {
      width: 16px;
      height: 16px;
      stroke: var(--green-light);
    }

    .detail-price-big {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .detail-price-big span {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .contact-card-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .landlord-info {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .landlord-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--green-dark);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      background: var(--cream-dark);
      color: var(--green-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .similar-section {
      margin-top: 64px;
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-logo"><a href="../index.html">Nyumba<span>UG</span></a></div>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="listings.html" class="active">Browse Listings</a></li>
      <li><a href="list-property.html">List Property</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html" class="nav-cta">Sign Up</a></li>
    </ul>
  </nav>

  <div id="detail-content" style="padding-top: var(--nav-h);">
    <div style="text-align:center; padding: 80px; color: var(--text-muted);">Loading property...</div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // ── API BASE (defined first so all functions can use it) ──
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:5000/api'
      : 'https://nyumbaug-full.onrender.com/api';

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'));
    const listingId = params.get('id');
    const listing = listings.find(l => l.id === id);

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).slice(0, 2).join('');
    }

    if (!listing) {
      document.getElementById('detail-content').innerHTML = `
        <div style="text-align:center; padding: 80px;">
          <h2 style="color:var(--green-dark);">Property Not Found</h2>
          <p style="color:var(--text-muted); margin: 12px 0 24px;">This listing may have been removed.</p>
          <a href="listings.html" class="btn btn-green">Browse All Listings</a>
        </div>
      `;
    } else {
      const similar = listings
        .filter(l => l.id !== listing.id && (l.type === listing.type || l.location.includes(listing.location.split(',')[0])))
        .slice(0, 3);

      document.title = listing.title + ' — Nyumba UG';

      document.getElementById('detail-content').innerHTML = `
        <div class="detail-wrapper">
          <div class="breadcrumb">
            <a href="../index.html">Home</a> ›
            <a href="listings.html">Listings</a> ›
            <span>${listing.title}</span>
          </div>

          <!-- GALLERY -->
          <div class="detail-gallery">
            <div class="gallery-main">
              <img src="${listing.image}" alt="${listing.title}" />
            </div>
            <div class="gallery-side">
              <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&q=80" alt="Kitchen" />
              <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&q=80" alt="Living room" />
            </div>
          </div>

          <!-- DETAIL LAYOUT -->
          <div class="detail-layout">
            <!-- MAIN INFO -->
            <div>
              <h1 class="detail-title">${listing.title}</h1>
              <div class="detail-location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${listing.location}
              </div>

              <div class="detail-price-big">${formatUGX(listing.price)} <span>/ month</span></div>

              <div style="display:flex; gap: 24px; margin: 24px 0; padding: 20px; background: var(--white); border-radius: var(--radius); border: 1px solid var(--border);">
                <div style="text-align:center;">
                  <div style="font-size:1.4rem; font-weight:700; color:var(--green-dark);">${listing.bedrooms}</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">Bedrooms</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:1.4rem; font-weight:700; color:var(--green-dark);">${listing.bathrooms}</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">Bathrooms</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:1.4rem; font-weight:700; color:var(--green-dark);">${listing.area}</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">m² Area</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-size:1.4rem; font-weight:700; color:var(--gold);">✓</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">Verified</div>
                </div>
              </div>

              <h3 style="color:var(--green-dark); margin-bottom: 12px;">About this Property</h3>
              <p style="color:var(--text-mid); line-height:1.8; font-size:0.97rem;">${listing.description}</p>

              <h3 style="color:var(--green-dark); margin: 28px 0 16px;">Amenities & Features</h3>
              <div class="amenity-grid">
                ${listing.amenities.map(a => `
                  <div class="amenity-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    ${a}
                  </div>
                `).join('')}
              </div>

              <div style="margin-top: 28px;">
                <h3 style="color:var(--green-dark); margin-bottom: 12px;">Property Tags</h3>
                <div class="tag-list">
                  <span class="tag">${listing.type === 'apartment' ? '🏢 Apartment' : listing.type === 'house' ? '🏠 House' : '🏨 Studio'}</span>
                  <span class="tag">📍 ${listing.location}</span>
                  <span class="tag">🛏 ${listing.bedrooms} Bedroom${listing.bedrooms > 1 ? 's' : ''}</span>
                  <span class="tag">📐 ${listing.area} m²</span>
                  <span class="tag">✅ Available: ${listing.available}</span>
                </div>
              </div>
            </div>

            <!-- CONTACT CARD -->
            <div>
              <div class="detail-price-card">
                <p class="contact-card-label">Rent per Month</p>
                <div class="detail-price-big" style="margin-bottom:20px;">${formatUGX(listing.price)} <span>/ mo</span></div>

                <div class="landlord-info">
                  <div class="landlord-avatar">${getInitials(listing.landlord)}</div>
                  <div>
                    <div style="font-weight:600; color:var(--text-dark);">${listing.landlord}</div>
                    <div style="font-size:0.8rem; color:var(--text-muted);">Property Owner · Verified ✓</div>
                  </div>
                </div>

                <div style="margin-bottom: 14px;">
                  <div class="contact-card-label">Availability</div>
                  <div style="font-weight: 500; color: var(--green-light);">✓ ${listing.available}</div>
                </div>

                <a href="tel:${listing.phone.replace(/\s/g, '')}" class="btn btn-green" style="width:100%; justify-content:center; margin-bottom: 10px;">
                  📞 Call Landlord
                </a>

                <a href="https://wa.me/${listing.phone.replace(/[\s+]/g, '')}" target="_blank" class="btn btn-primary" style="width:100%; justify-content:center; background: #25D366; margin-bottom: 10px;">
                  💬 WhatsApp
                </a>

                <button class="btn" style="width:100%; justify-content:center; border: 1.5px solid var(--border); color: var(--text-mid);"
                  onclick="toggleFav(event, this, ${listing.id}); showToast('❤️ Saved to favourites')">
                  ♡ Save Property
                </button>

                <div style="margin-top: 20px; padding: 14px; background: var(--cream); border-radius: var(--radius); font-size: 0.82rem; color: var(--text-muted); line-height: 1.6;">
                  📌 <strong>Tip:</strong> Always view the property in person before making any payments. Nyumba UG never asks for money upfront.
                </div>
              </div>
            </div>
          </div>

          <!-- ── REVIEWS SECTION (always rendered, outside similar check) ── -->
          <div style="margin-top:48px;" id="reviews-section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
              <div>
                <h2 class="section-title" style="margin-bottom:4px;">Tenant Reviews</h2>
                <div id="reviews-summary" style="color:var(--text-muted);font-size:0.9rem;"></div>
              </div>
              <button class="btn btn-green" id="write-review-btn" onclick="toggleReviewForm()" style="display:none;">
                ✍️ Write a Review
              </button>
            </div>

            <!-- REVIEW FORM -->
            <div id="review-form-wrapper" style="display:none;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:28px;margin-bottom:28px;">
              <h3 style="color:var(--green-dark);margin-bottom:20px;">Your Review</h3>
              <div style="margin-bottom:20px;">
                <label style="display:block;font-size:0.87rem;font-weight:500;color:var(--text-mid);margin-bottom:10px;">Rating *</label>
                <div id="star-selector" style="display:flex;gap:8px;">
                  <button type="button" onclick="setRating(1)" data-star="1" style="font-size:2rem;background:none;border:none;cursor:pointer;padding:4px;line-height:1;" onmouseover="hoverRating(1)" onmouseout="resetHover()">☆</button>
                  <button type="button" onclick="setRating(2)" data-star="2" style="font-size:2rem;background:none;border:none;cursor:pointer;padding:4px;line-height:1;" onmouseover="hoverRating(2)" onmouseout="resetHover()">☆</button>
                  <button type="button" onclick="setRating(3)" data-star="3" style="font-size:2rem;background:none;border:none;cursor:pointer;padding:4px;line-height:1;" onmouseover="hoverRating(3)" onmouseout="resetHover()">☆</button>
                  <button type="button" onclick="setRating(4)" data-star="4" style="font-size:2rem;background:none;border:none;cursor:pointer;padding:4px;line-height:1;" onmouseover="hoverRating(4)" onmouseout="resetHover()">☆</button>
                  <button type="button" onclick="setRating(5)" data-star="5" style="font-size:2rem;background:none;border:none;cursor:pointer;padding:4px;line-height:1;" onmouseover="hoverRating(5)" onmouseout="resetHover()">☆</button>
                </div>
                <input type="hidden" id="review-rating" value="0" />
              </div>
              <div class="form-group">
                <label>Review Title</label>
                <input type="text" id="review-title" placeholder="Summarise your experience (optional)" maxlength="120" />
              </div>
              <div class="form-group">
                <label>Your Review *</label>
                <textarea id="review-body" rows="4" placeholder="Share your experience with this property..." style="resize:vertical;"></textarea>
              </div>
              <div style="display:flex;gap:12px;">
                <button class="btn btn-green" onclick="submitReview()">Submit Review</button>
                <button class="btn-sm" onclick="toggleReviewForm()" style="padding:10px 20px;">Cancel</button>
              </div>
              <div id="review-error" style="color:#dc2626;font-size:0.85rem;margin-top:12px;display:none;"></div>
            </div>

            <!-- REVIEWS LIST -->
            <div id="reviews-list">
              <div style="text-align:center;padding:32px;color:var(--text-muted);">Loading reviews...</div>
            </div>
          </div>

          <!-- SIMILAR LISTINGS (only if they exist) -->
          ${similar.length > 0 ? `
            <div class="similar-section">
              <h2 class="section-title" style="margin-bottom: 24px;">Similar Properties</h2>
              <div class="listings-grid" id="similar-container"></div>
            </div>
          ` : ''}

        </div>
      `;

      // Render similar listings now that the DOM is ready
      if (similar.length > 0) {
        renderListings(similar, 'similar-container');
      }

      // ── Load reviews immediately (DOMContentLoaded already fired) ──
      loadReviews();
    }

    // ── REVIEWS LOGIC ──
    let currentRating = 0;

    async function loadReviews() {
      const summaryEl = document.getElementById('reviews-summary');
      const listEl = document.getElementById('reviews-list');

      // Guard: if elements don't exist, bail out
      if (!summaryEl || !listEl) return;

      try {
        const res = await fetch(`${API_BASE}/reviews/listing/${listingId}`);
        const data = await res.json();

        // Summary
        if (data.total > 0) {
          summaryEl.innerHTML = `${renderStars(data.average)} <strong>${data.average}</strong> out of 5 &nbsp;·&nbsp; ${data.total} review${data.total !== 1 ? 's' : ''}`;
        } else {
          summaryEl.textContent = 'No reviews yet — be the first!';
        }

        // Show write-review button for logged-in tenants
        const user = typeof api !== 'undefined' && api.auth ? api.auth.currentUser() : null;
        if (user && user.role === 'tenant') {
          const btn = document.getElementById('write-review-btn');
          if (btn) btn.style.display = 'flex';
        }

        // Render reviews
        if (!data.reviews || !data.reviews.length) {
          listEl.innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--text-muted);">
              <div style="font-size:2.5rem;margin-bottom:12px;">⭐</div>
              <p>No reviews yet for this property.</p>
            </div>`;
          return;
        }

        listEl.innerHTML = data.reviews.map(r => `
          <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
              <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:40px;height:40px;border-radius:50%;background:var(--green-dark);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0;">
                  ${r.tenant_name.split(' ').map(n => n[0]).slice(0, 2).join('')}
                </div>
                <div>
                  <div style="font-weight:600;color:var(--text-dark);">${r.tenant_name}</div>
                  <div style="font-size:0.8rem;color:var(--text-muted);">${new Date(r.created_at).toLocaleDateString('en-UG', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                </div>
              </div>
              <div style="font-size:1.1rem;">${renderStars(r.rating)}</div>
            </div>
            ${r.title ? `<div style="font-weight:600;color:var(--text-dark);margin-bottom:6px;">${r.title}</div>` : ''}
            <p style="color:var(--text-mid);line-height:1.7;font-size:0.95rem;">${r.body}</p>
          </div>
        `).join('');

      } catch (e) {
        console.error('Reviews failed to load:', e);
        if (listEl) listEl.innerHTML = `
          <div style="text-align:center;padding:32px;color:var(--text-muted);">
            Could not load reviews at this time.
          </div>`;
      }
    }

    function renderStars(rating) {
      return [1, 2, 3, 4, 5].map(n =>
        `<span style="color:${n <= Math.round(rating) ? '#f59e0b' : '#d1d5db'};">★</span>`
      ).join('');
    }

    function setRating(n) {
      currentRating = n;
      document.getElementById('review-rating').value = n;
      document.querySelectorAll('#star-selector button').forEach((btn, i) => {
        btn.textContent = i < n ? '★' : '☆';
        btn.style.color = i < n ? '#f59e0b' : '#888';
      });
    }

    function hoverRating(n) {
      document.querySelectorAll('#star-selector button').forEach((btn, i) => {
        btn.textContent = i < n ? '★' : '☆';
        btn.style.color = i < n ? '#f59e0b' : '#888';
      });
    }

    function resetHover() { setRating(currentRating); }

    function toggleReviewForm() {
      const form = document.getElementById('review-form-wrapper');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function submitReview() {
      const rating = parseInt(document.getElementById('review-rating').value);
      const title = document.getElementById('review-title').value.trim();
      const body = document.getElementById('review-body').value.trim();
      const errEl = document.getElementById('review-error');

      errEl.style.display = 'none';

      if (!rating) { errEl.textContent = 'Please select a star rating.'; errEl.style.display = 'block'; return; }
      if (!body || body.length < 10) { errEl.textContent = 'Please write at least 10 characters.'; errEl.style.display = 'block'; return; }

      try {
        const res = await fetch(`${API_BASE}/reviews`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('nyumba_token')
          },
          body: JSON.stringify({ listing_id: listingId, rating, title, body })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);

        showToast('✅ Review submitted!');
        document.getElementById('review-form-wrapper').style.display = 'none';
        document.getElementById('review-title').value = '';
        document.getElementById('review-body').value = '';
        setRating(0);
        loadReviews();
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>

</html>
