<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Property Detail — Nyumba UG</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
  <style>
    .detail-wrapper {
      padding: 32px 5% 80px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .breadcrumb a {
      color: var(--green-light);
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .detail-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    .detail-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--text-mid);
      margin-bottom: 24px;
    }

    .detail-location svg {
      width: 16px;
      height: 16px;
      stroke: var(--green-light);
    }

    .detail-price-big {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .detail-price-big span {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .contact-card-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .landlord-info {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .landlord-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--green-dark);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      background: var(--cream-dark);
      color: var(--green-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .similar-section {
      margin-top: 64px;
    }

    @media(max-width:768px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .detail-gallery {
        grid-template-columns: 1fr;
        height: 240px;
      }

      .gallery-side {
        display: none;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</head>

<body>

  <nav>
    <div class="nav-logo"><a href="../index.html">Nyumba<span>UG</span></a></div>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="listings.html" class="active">Browse Listings</a></li>
      <li><a href="list-property.html">List Property</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html" class="nav-cta">Sign Up</a></li>
    </ul>
  </nav>

  <div id="detail-content" style="padding-top:var(--nav-h);">
    <div style="text-align:center;padding:80px;color:var(--text-muted);">Loading property...</div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // Use global API_BASE from api.js if available, else define locally
    const APIBASE = (typeof API_BASE !== 'undefined' ? API_BASE : null)
      || (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:5000/api'
        : 'https://nyumbaug-full.onrender.com/api');

    const listingId = new URLSearchParams(location.search).get('id');
    let currentRating = 0;

    function openEnquiryModal() {
      if (!api.auth.isLoggedIn()) {
        showToast('❌ Please log in to send an enquiry.');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }
      document.getElementById('enquiry-modal').style.display = 'flex';
    }

    async function submitEnquiry() {
      const name = document.getElementById('enq-name').value.trim();
      const phone = document.getElementById('enq-phone').value.trim();
      const email = document.getElementById('enq-email').value.trim();
      const message = document.getElementById('enq-message').value.trim();

      if (!name || !phone || !message) {
        showToast('❌ Please fill in Name, Phone and Message.');
        return;
      }

      // Always get listingId fresh from URL
      const currentListingId = new URLSearchParams(location.search).get('id');

      const btn = document.querySelector('#enquiry-modal .btn.btn-green');
      if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }

      try {
        const res = await fetch(`${APIBASE}/enquiries`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('nyumba_token')}`
          },
          body: JSON.stringify({
            listing_id: currentListingId,
            name, phone, email, message
          })
        });

        const data = await res.json();

        if (data.success) {
          showToast('✅ Enquiry sent! The landlord will contact you soon.');
          document.getElementById('enquiry-modal').style.display = 'none';
          document.getElementById('enq-name').value = '';
          document.getElementById('enq-phone').value = '';
          document.getElementById('enq-email').value = '';
          document.getElementById('enq-message').value = '';
        } else {
          showToast('❌ ' + (data.message || 'Failed to send enquiry.'));
        }
      } catch (e) {
        console.error('Enquiry error:', e);
        showToast('❌ Failed to send. Please check your connection.');
      } finally {
        if (btn) { btn.textContent = 'Send Enquiry'; btn.disabled = false; }
      }
    }

    async function submitReview() {
      const rating = parseInt(document.getElementById('review-rating').value);
      const title = document.getElementById('review-title').value.trim();
      const comment = document.getElementById('review-body').value.trim(); // ⚡ CHANGED from body to comment
      const errEl = document.getElementById('review-error');

      if (!errEl) return;
      errEl.style.display = 'none';

      // Client-side instant validation 
      if (!rating) {
        errEl.textContent = 'Please select a star rating.';
        errEl.style.display = 'block';
        return;
      }
      if (!comment || comment.length < 10) {
        errEl.textContent = 'Please write a descriptive review of at least 10 characters.';
        errEl.style.display = 'block';
        return;
      }


      try {
        // 🚀 Update the parameters passed into your api service method
        const data = await api.reviews.submit(listingId, rating, title, comment);

        if (data.success) {
          showToast('✅ Review submitted successfully!');

          const formWrapper = document.getElementById('review-form-wrapper');
          if (formWrapper) formWrapper.style.display = 'none';

          // Reset input fields for the next interaction
          document.getElementById('review-title').value = '';
          document.getElementById('review-body').value = '';
          setRating(0);

          // Auto-reload the active visual review stack feed instantly
          loadReviews();
        }
      } catch (e) {
        // Captures custom error validation strings returned directly from your Node/Express server
        errEl.textContent = e.message || 'Failed to send your review. Please try again.';
        errEl.style.display = 'block';
      }
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(n => n[0]).slice(0, 2).join('');
    }

    async function loadListing() {
      if (!listingId) { showNotFound(); return; }

      // Try API first
      try {
        const res = await fetch(`${APIBASE}/listings/${listingId}`);
        if (res.ok) {
          const data = await res.json();
          // 🚀 FIXED: Changed data.listing to data.data to match your backend JSON layout
          if (data.success && data.data) {
            renderDetail(data.data);
            return;
          }
        }
      } catch (e) {
        console.warn('API unavailable, using local data');
      }

      // Fallback to not-found
      showNotFound();
    }

    function showNotFound() {
      document.getElementById('detail-content').innerHTML = `
      <div style="text-align:center;padding:80px;">
        <h2 style="color:var(--green-dark);">Property Not Found</h2>
        <p style="color:var(--text-muted);margin:12px 0 24px;">This listing may have been removed.</p>
        <a href="listings.html" class="btn btn-green">Browse All Listings</a>
      </div>`;
    }

    function renderDetail(l) {
      const image = (l.image_url ? (l.image_url.startsWith('http') ? l.image_url : `${APIBASE.replace('/api', '')}${l.image_url}`) : null) ||
        l.images?.[0]?.url || l.cover_image || l.image ||
        'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=900&q=80';
      const location = `${l.neighbourhood || ''}, ${l.district || 'Kampala'}`;
      const amenities = Array.isArray(l.amenities) ? l.amenities : [];

      document.title = l.title + ' — Nyumba UG';

      document.getElementById('detail-content').innerHTML = `
      <div class="detail-wrapper">
        <div class="breadcrumb">
          <a href="../index.html">Home</a> ›
          <a href="listings.html">Listings</a> ›
          <span>${l.title}</span>
        </div>

        <div class="detail-gallery" style="position:relative;">
          <div class="gallery-main">
            <img src="${image}" alt="${l.title}" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=900&q=80'" />
          </div>
          ${l.status === 'rented' ? '<div class="rented-overlay" style="border-radius:var(--radius-lg);"><span class="rented-label">RENTED</span></div>' : ''}
          <div class="gallery-side">
            <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&q=80" alt="Kitchen" />
            <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&q=80" alt="Living room" />
          </div>
        </div>

        <div class="detail-layout">
          <div>
            <h1 class="detail-title">${l.title}</h1>
            <div class="detail-location">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${location}
            </div>

            <div class="detail-price-big">${formatUGX(l.price)} <span>/ month</span></div>

            <div style="display:flex;gap:24px;margin:24px 0;padding:20px;background:var(--white);border-radius:var(--radius);border:1px solid var(--border);flex-wrap:wrap;">
              <div style="text-align:center;">
                <div style="font-size:1.4rem;font-weight:700;color:var(--green-dark);">${l.bedrooms}</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Bedrooms</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:1.4rem;font-weight:700;color:var(--green-dark);">${l.bathrooms}</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Bathrooms</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:1.4rem;font-weight:700;color:var(--green-dark);">${l.area_sqm || l.area || '—'}</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">m² Area</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:1.4rem;font-weight:700;color:var(--gold);">✓</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Verified</div>
              </div>
            </div>

            <h3 style="color:var(--green-dark);margin-bottom:12px;">About this Property</h3>
            <p style="color:var(--text-mid);line-height:1.8;font-size:0.97rem;">${l.description || 'No description available.'}</p>

            ${amenities.length ? `
            <h3 style="color:var(--green-dark);margin:28px 0 16px;">Amenities & Features</h3>
            <div class="amenity-grid">
              ${amenities.map(a => `
                <div class="amenity-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                  ${a}
                </div>`).join('')}
            </div>` : ''}

            <div style="margin-top:28px;">
              <h3 style="color:var(--green-dark);margin-bottom:12px;">Property Tags</h3>
              <div class="tag-list">
                <span class="tag">${l.type === 'apartment' ? '🏢 Apartment' : l.type === 'house' ? '🏠 House' : '🏨 Studio'}</span>
                <span class="tag">📍 ${location}</span>
                <span class="tag">🛏 ${l.bedrooms} Bedroom${l.bedrooms > 1 ? 's' : ''}</span>
                <span class="tag">📐 ${l.area_sqm || l.area || '—'} m²</span>
                <span class="tag">✅ Available: ${l.available_from ? new Date(l.available_from).toLocaleDateString('en-UG', { day: 'numeric', month: 'short', year: 'numeric' }) : (l.available || 'Immediately')}</span>
              </div>
            </div>

            <!-- REVIEWS -->
            <div style="margin-top:48px;" id="reviews-section">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
                <div>
                  <h2 style="font-family:'Fraunces',serif;font-size:1.5rem;color:var(--green-dark);margin-bottom:4px;">Tenant Reviews</h2>
                  <div id="reviews-summary" style="color:var(--text-muted);font-size:0.9rem;">Loading...</div>
                </div>
                <button class="btn btn-green" id="write-review-btn" onclick="toggleReviewForm()" style="display:none;">✍️ Write a Review</button>
              </div>

              <div id="review-form-wrapper" style="display:none;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:28px;margin-bottom:28px;">
                <h3 style="color:var(--green-dark);margin-bottom:20px;">Your Review</h3>
                <div style="margin-bottom:20px;">
                  <label style="display:block;font-size:0.87rem;font-weight:500;color:var(--text-mid);margin-bottom:10px;">Rating *</label>
                  <div id="star-selector" style="display:flex;gap:8px;">
                    ${[1, 2, 3, 4, 5].map(n => `<button type="button" onclick="setRating(${n})" onmouseover="hoverRating(${n})" onmouseout="resetHover()" style="font-size:2rem;background:none;border:none;cursor:pointer;padding:4px;line-height:1;">☆</button>`).join('')}
                  </div>
                  <input type="hidden" id="review-rating" value="0" />
                </div>
                <div class="form-group">
                  <label>Review Title</label>
                  <input type="text" id="review-title" placeholder="Summarise your experience (optional)" maxlength="120" />
                </div>
                <div class="form-group">
                  <label>Your Review *</label>
                  <textarea id="review-body" rows="4" placeholder="Share your experience with this property..." style="resize:vertical;width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;"></textarea>
                </div>
                <div style="display:flex;gap:12px;">
                  <button class="btn btn-green" onclick="submitReview()">Submit Review</button>
                  <button class="btn-sm" onclick="toggleReviewForm()" style="padding:10px 20px;">Cancel</button>
                </div>
                <div id="review-error" style="color:#dc2626;font-size:0.85rem;margin-top:12px;display:none;"></div>
              </div>

              <div id="reviews-list">
                <div style="text-align:center;padding:32px;color:var(--text-muted);">Loading reviews...</div>
              </div>
            </div>
          </div>

          <!-- CONTACT CARD -->
          <div>
            <div class="detail-price-card">
              <p class="contact-card-label">Rent per Month</p>
              <div class="detail-price-big" style="margin-bottom:20px;">${formatUGX(l.price)} <span>/ mo</span></div>

              <div class="landlord-info">
                <div class="landlord-avatar">${getInitials(l.landlord_name || l.landlord)}</div>
                <div>
                  <div style="font-weight:600;color:var(--text-dark);">${l.landlord_name || l.landlord || 'Landlord'}</div>
                  <div style="font-size:0.8rem;color:var(--text-muted);">Property Owner · Verified ✓</div>
                </div>
              </div>

              <div style="margin-bottom:14px;">
                <div class="contact-card-label">Availability</div>
                <div style="font-weight:500;color:var(--green-light);">✓ ${l.available_from ? new Date(l.available_from).toLocaleDateString('en-UG', { day: 'numeric', month: 'short', year: 'numeric' }) : (l.available || 'Immediately')}</div>
              </div>

              <a href="tel:${(l.landlord_phone || l.phone || '').replace(/\s/g, '')}" class="btn btn-green" style="width:100%;justify-content:center;margin-bottom:10px;">
                📞 Call Landlord
              </a>
              <a href="https://wa.me/${(l.landlord_phone || l.phone || '').replace(/[\s+]/g, '')}" target="_blank" class="btn btn-primary" style="width:100%;justify-content:center;background:#25D366;margin-bottom:10px;">
                💬 WhatsApp
              </a>
              <button class="btn btn-green" style="width:100%; justify-content:center; margin-top:10px;" 
                onclick="openEnquiryModal()">
                  📩 Enquire about this Property
                    </button><br/><br/>
              ${l.landlord_id ? `<a href="chat.html?with=${l.landlord_id}&listing=${l.id}&title=${encodeURIComponent(l.title)}"
                class="btn" style="width:100%;justify-content:center;border:1.5px solid var(--green-light);color:var(--green-light);margin-bottom:10px;text-decoration:none;display:flex;align-items:center;gap:8px;">
                ✉️ Message Landlord
              </a>` : ''}
              <button class="btn" style="width:100%;justify-content:center;border:1.5px solid var(--border);color:var(--text-mid);"
                onclick="toggleFav(event,this,'${l.id}');showToast('❤️ Saved to favourites')">
                ♡ Save Property
              </button>

              <div style="margin-top:20px;padding:14px;background:var(--cream);border-radius:var(--radius);font-size:0.82rem;color:var(--text-muted);line-height:1.6;">
                📌 <strong>Tip:</strong> Always view the property in person before making any payments.
              </div>
            </div>
          </div>
        </div>

        <!-- SIMILAR -->
        <div class="similar-section" id="similar-section" style="display:none;">
          <h2 class="section-title" style="margin-bottom:24px;">Similar Properties</h2>
          <div class="listings-grid" id="similar-container"></div>
        </div>
      </div>`;

      loadSimilar(l);
      loadReviews();
    }

    async function loadSimilar(listing) {
      try {
        const res = await fetch(`${APIBASE}/listings?type=${listing.type}&limit=6`);
        if (res.ok) {
          const data = await res.json();
          const similar = (data.data || []).filter(l => String(l.id) !== String(listing.id)).slice(0, 3);
          if (similar.length) {
            document.getElementById('similar-section').style.display = 'block';
            renderSimilar(similar);
            return;
          }
        }
      } catch (e) { /* no similar listings */ }
    }

    function renderSimilar(data) {
      const container = document.getElementById('similar-container');
      if (!container) return;
      container.innerHTML = data.map(l => {
        const image = l.cover_image || l.images?.[0]?.url || l.image ||
          'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&q=80';
        const loc = l.neighbourhood || l.location || 'Kampala';
        return `
        <div class="listing-card" onclick="window.location.href='listing-detail.html?id=${l.id}'">
          <div class="listing-img">
            <img src="${image}" alt="${l.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&q=80'" />
            <span class="listing-badge ${l.badge === 'new' ? 'new' : ''}">${l.badge === 'new' ? '🆕 New' : '✅ Available'}</span>
            <button class="listing-fav" onclick="toggleFav(event,this,'${l.id}')" aria-label="Save">
              <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
          </div>
          <div class="listing-body">
            <div class="listing-price">${formatUGX(l.price)} <span>/ month</span></div>
            <div class="listing-title">${l.title}</div>
            <div class="listing-location">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${loc}
            </div>
            <div class="listing-amenities">
              <div class="amenity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>${l.bedrooms} Bed${l.bedrooms !== 1 ? 's' : ''}</div>
              <div class="amenity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16M4 6h16M4 18h16"/></svg>${l.bathrooms} Bath${l.bathrooms !== 1 ? 's' : ''}</div>
              <div class="amenity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>${l.area_sqm || l.area || '—'} m²</div>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ── REVIEWS ──
    async function loadReviews() {
      try {
        const data = await api.reviews.getListing(listingId);
        const summary = document.getElementById('reviews-summary');
        if (!summary) return;

        if (data.total > 0) {
          summary.innerHTML = `${renderStars(data.average)} <strong>${parseFloat(data.average).toFixed(1)}</strong> out of 5 &nbsp;·&nbsp; ${data.total} review${data.total !== 1 ? 's' : ''}`;
        } else {
          summary.textContent = 'No reviews yet — be the first!';
        }

        const user = api.auth.currentUser();
        if (user && user.role === 'tenant') {
          const btn = document.getElementById('write-review-btn');
          if (btn) btn.style.display = 'flex';
        }

        const container = document.getElementById('reviews-list');
        if (!container) return;

        if (!data.reviews || !data.reviews.length) {
          container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);"><div style="font-size:2.5rem;margin-bottom:12px;">⭐</div><p>No reviews yet for this property.</p></div>`;
          return;
        }

        container.innerHTML = data.reviews.map(r => `
        <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:40px;height:40px;border-radius:50%;background:var(--green-dark);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;">
                ${getInitials(r.tenant_name || 'Tenant')}
              </div>
              <div>
                <div style="font-weight:600;color:var(--text-dark);">${r.tenant_name || 'Verified Tenant'}</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">${new Date(r.created_at).toLocaleDateString('en-UG', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
              </div>
            </div>
            <div style="font-size:1.2rem;">${renderStars(r.rating)}</div>
          </div>
          ${r.title ? `<div style="font-weight:600;color:var(--text-dark);margin-bottom:6px;">${r.title}</div>` : ''}
          <p style="color:var(--text-mid);line-height:1.7;font-size:0.95rem;">${r.comment || ''}</p>
        </div>`).join('');
      } catch (e) {
        const container = document.getElementById('reviews-list');
        if (container) container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);">No reviews yet.</div>`;
        const summary = document.getElementById('reviews-summary');
        if (summary) summary.textContent = 'No reviews yet — be the first!';
      }
    }

    function renderStars(rating) {
      return [1, 2, 3, 4, 5].map(n =>
        `<span style="color:${n <= Math.round(rating) ? '#f59e0b' : '#d1d5db'};">★</span>`
      ).join('');
    }

    function setRating(n) {
      currentRating = n;
      const inp = document.getElementById('review-rating');
      if (inp) inp.value = n;
      document.querySelectorAll('#star-selector button').forEach((btn, i) => {
        btn.textContent = i < n ? '★' : '☆';
        btn.style.color = i < n ? '#f59e0b' : '#888';
      });
    }

    function hoverRating(n) {
      document.querySelectorAll('#star-selector button').forEach((btn, i) => {
        btn.textContent = i < n ? '★' : '☆';
        btn.style.color = i < n ? '#f59e0b' : '#888';
      });
    }

    function resetHover() { setRating(currentRating); }

    function toggleReviewForm() {
      const form = document.getElementById('review-form-wrapper');
      if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    loadListing();
  </script>
  <div id="enquiry-modal"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:12px; width:90%; max-width:400px;">
      <h3>Send Enquiry</h3>
      <p style="color:var(--text-muted); font-size: 0.9rem;">The landlord will be notified of your interest.</p>
      <div class="form-group" style="margin-top:15px;">
        <input type="text" id="enq-name" placeholder="Your Full Name"
          style="width:100%; padding:10px; margin-bottom:10px;" />
        <input type="text" id="enq-phone" placeholder="Your Phone Number"
          style="width:100%; padding:10px; margin-bottom:10px;" />
        <input type="email" id="enq-email" placeholder="Your Email (Optional)"
          style="width:100%; padding:10px; margin-bottom:10px;" />
        <textarea id="enq-message" placeholder="I am interested in this property..."
          style="width:100%; padding:10px; height:80px;"></textarea>
      </div>
      <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn btn-green" onclick="submitEnquiry()" style="flex:1;">Send Enquiry</button>
        <button class="btn" onclick="document.getElementById('enquiry-modal').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>
</body>

</html>
